name: "{{NAME}}"
created: "{{CREATED}}"

trigger:
  type: webhook
  path: /{{NAME}}
  # secret: "${SENTRY_CLIENT_SECRET}"
  # signature_header: Sentry-Hook-Signature

notify:
  message: |
    {{ .body.data.issue.title }}
    {{ .body.data.issue.culprit }}
    {{ .body.data.issue.web_url }}
  approval: true

workspace:
  type: git-clone

agent:
  prompt: |
    Investigate this Sentry error and suggest a fix.

    Title: {{ .body.data.issue.title }}
    Culprit: {{ .body.data.issue.culprit }}
    Level: {{ .body.data.issue.level }}
    Platform: {{ .body.data.issue.platform }}
    Sentry URL: {{ .body.data.issue.web_url }}
  timeout: 10m
