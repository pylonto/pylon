server:
  port: 8080

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: ${TELEGRAM_CHAT_ID}

pipelines:
  sentry-review:
    trigger:
      type: webhook
      path: /sentry
      secret: "${SENTRY_CLIENT_SECRET}"
      signature_header: sentry-hook-signature

    notify:
      message: |
        *{{ .body.error }}*
        Repo: `{{ .body.repo }}`
        Ref: `{{ .body.ref }}`
      actions:
        investigate: true
        auto: false

    workspace:
      repo: "{{ .body.repo }}"
      ref: "{{ .body.ref }}"

    agent:
      image: pylon/agent-claude
      prompt: "Investigate this error: {{ .body.error }}"
      timeout: 10m
      auth: oauth
      max_agents: 3

  mock-review:
    trigger:
      type: webhook
      path: /mock

    workspace:
      repo: "{{ .body.repo }}"
      ref: "{{ .body.ref }}"

    agent:
      image: pylon/agent-mock
      prompt: "{{ .body.error }}"
      timeout: 1m
