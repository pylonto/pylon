server:
  port: 8080

pipelines:
  sentry-review:
    trigger:
      type: webhook
      path: /sentry

    workspace:
      repo: "{{ .body.repo }}"
      ref: "{{ .body.ref }}"

    agent:
      image: pylon/agent-claude
      prompt: "Investigate this error: {{ .body.error }}"
      timeout: 10m
      auth: oauth

  mock-review:
    trigger:
      type: webhook
      path: /mock

    workspace:
      repo: "{{ .body.repo }}"
      ref: "{{ .body.ref }}"

    agent:
      image: pylon/agent-mock
      prompt: "{{ .body.error }}"
      timeout: 1m
